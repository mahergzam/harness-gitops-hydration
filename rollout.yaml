---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  labels:
    app.kubernetes.io/managed-by: harness-gitops
    app.kubernetes.io/name: test-app
    app.kubernetes.io/part-of: harness-gitops-hydration
  name: preprod-test-app
  namespace: test-app-preprod
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: test-app
  strategy:
    canary:
      canaryService: test-app-canary
      maxSurge: 25%
      maxUnavailable: 0
      stableService: test-app-stable
      steps:
      - setWeight: 20
      - pause:
          duration: 2m
      - analysis:
          templates:
          - templateName: success-rate
      - setWeight: 50
      - pause:
          duration: 5m
      - setWeight: 100
      trafficRouting:
        nginx:
          stableIngress: test-app
  template:
    metadata:
      labels:
        app.kubernetes.io/component: web
        app.kubernetes.io/name: test-app
    spec:
      containers:
      - image: nginx:1.26.3
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 2
        name: test-app
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 101
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: /
            port: http
          periodSeconds: 10
