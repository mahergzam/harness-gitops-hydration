apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: studio-app-prod
  namespace: argocd
  annotations:
    harness.io/skip-validation: "true"
spec:
  project: default
  source:
    repoURL: https://github.com/mahergzam/harness-gitops-hydration.git
    targetRevision: envs/prod
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: test-app-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
