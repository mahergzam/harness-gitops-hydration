apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: preprod-
namespace: test-app-preprod
resources:
  - ../../base
patches:
  - path: patch-replicas.yaml
    target:
      kind: Deployment
      name: test-app
images:
  - name: nginx
    newTag: 1.25.0  # Harness pipeline will update this tag
